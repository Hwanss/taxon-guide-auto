name: Auto Topic Refiller

on:
  workflow_dispatch: # 수동으로 채우고 싶을 때 버튼 클릭 가능
  schedule:
    # 한국 시간 기준 매주 월요일 오전 5시 00분에 자동으로 실행되어 시트 리필
    - cron: '0 20 * * 0'

jobs:
  refill-topics:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gspread google-auth google-generativeai

    - name: Run Topic Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
      run: python generate_topics.py
