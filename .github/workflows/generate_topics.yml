name: Auto Topic Refiller

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # ⏰ 매주 월요일 오전 9시 (한국시간 기준) 실행 (필요시 시간 수정 가능)
    - cron: '0 0 * * 1'

jobs:
  refill-topics:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 🔥 파이썬 3.12 최신 버전으로 업그레이드
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 🔥 옛날 도구 대신 최신 제미나이 패키지(google-genai) 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai gspread

    - name: Run Topic Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
      run: python generate_topics.py
