name: Daily Blog Auto-Publish

on:
  workflow_dispatch: # 수동 실행 버튼 유지
  schedule:
    # 한국 시간 기준 매일 오전 9시 15분, 오후 6시 15분에 실행
    # (다른 블로그가 정각에 실행된다면 15분 늦춰서 충돌 방지)
    - cron: '15 0,9 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 구버전 경고를 없애기 위해 3.10으로 업그레이드

    - name: Install dependencies
      # 여기에 openai 패키지 설치 명령어를 확실하게 추가했습니다!
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai openai

    - name: Run Python script
      env:
        # Secrets에 저장해둔 열쇠들을 파이썬이 쓸 수 있게 연결
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python main.py
