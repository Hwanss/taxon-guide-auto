name: Daily Blog Auto-Publish

# 👇 [핵심] 동일한 발행 작업이 동시에 겹쳐서 실행되는 것을 완전히 차단하는 잠금장치입니다.
concurrency:
  group: taxon-blog-publishing
  cancel-in-progress: false

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # ⏰ 한국 시간 기준 매일 오전 9시 15분, 오후 6시 15분에 하루 2번 실행
    - cron: '15 0,9 * * *'

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openai google-generativeai gspread google-auth

    - name: Run Blog Publisher
      env:
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
      run: python main.py
