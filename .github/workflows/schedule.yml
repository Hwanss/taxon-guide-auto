name: Daily Blog Auto-Publish

on:
  workflow_dispatch: # 수동 실행 (Run workflow) 버튼 활성화
  schedule:
    - cron: '0 0 * * *' # 매일 자정 자동 실행 (필요시 시간 수정 가능)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 구버전 경고를 없애기 위해 3.10으로 업그레이드

    - name: Install dependencies
      # 여기에 openai 패키지 설치 명령어를 확실하게 추가했습니다!
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai openai

    - name: Run Python script
      env:
        # Secrets에 저장해둔 열쇠들을 파이썬이 쓸 수 있게 연결
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python main.py
